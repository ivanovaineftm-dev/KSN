<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Processor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #222;
    }
    .container {
      max-width: 640px;
      margin: 80px auto;
      padding: 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      color: #555;
      margin-bottom: 20px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    input[type='file'] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    .status {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }
    .status.error {
      color: #b91c1c;
    }
    .status.ok {
      color: #166534;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Обработка Excel-файлов</h1>
    <p>Загрузите .xlsx файл. Сервис подсветит проблемные строки по заданным правилам и вернёт обработанный файл.</p>

    <form id="upload-form">
      <div class="row">
        <input id="file-input" type="file" accept=".xlsx" required />
        <button id="submit-btn" type="submit">Обработать и скачать</button>
      </div>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
